<div class="ia-assistant-studio">
    <h2>⚙️ Configuración del Asistente IA</h2>
    <p>Escribe el tema o la orden para generar las preguntas de selección múltiple:</p>
    
    <textarea id="prompt-input" rows="4">{prompt_docente}</textarea>
    
    <div class="actions">
        <button id="btn-generar">Generar y Guardar</button>
    </div>
    
    <p id="mensaje-estado">✅ ¡Preguntas generadas y guardadas en la base de datos!</p>
    <p id="mensaje-error" style="color: red; display: none;">❌ Hubo un error.</p>
</div>
