<div class="ia-comp-codigo" data-id="{id}" data-tipo="codigo" data-lenguaje="{lenguaje}">
    <div class="code-header">
        <div class="lang-tag">💻 Terminal: {lenguaje}</div>
        <p class="enunciado-codigo"><strong>Reto:</strong> {enunciado}</p>
        
        <div class="specs-box">
            <span><b>Input:</b> {entrada}</span> | <span><b>Output:</b> {salida}</span>
        </div>
    </div>
    
    <div class="editor-wrapper">
        <textarea class="code-input" autocomplete="off" spellcheck="false" placeholder="Escribe tu código aquí...">{codigo_inicial}</textarea>
    </div>
</div>
