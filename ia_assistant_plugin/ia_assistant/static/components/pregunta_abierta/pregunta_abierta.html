<div class="ia-pregunta-abierta-container">
    <div class="ia-abierta-header">
        <span class="ia-badge">Preguntas de Análisis</span>
    </div>

    <div class="ia-abierta-enunciado">
        {enunciado}
    </div>

    <div class="ia-abierta-input-wrapper">
        <textarea class="respuesta-alumno"
            placeholder="Escribe tu respuesta aquí..."></textarea>
        <div class="ia-char-counter">Si no sabe la respuesta deje vacío el campo de texto</div>
    </div>

    <div class="feedback-ia" style="display:none;">
        <div class="fb-content">
            <span class="fb-icon">🤖</span>
            <div class="fb-text"></div>
        </div>
    </div>
</div>
