<div class="ia-codigo-interior">
    <div class="code-header">
        <div class="code-header-top">
            <span class="lang-tag">Terminal: {lenguaje}</span>
        </div>
        <div class="enunciado-codigo">
            <strong>Enunciado:</strong> {enunciado}
        </div>
        <div class="specs-box">
            <div class="spec-item"><span class="spec-label">Input:</span> {entrada}</div>
            <div class="spec-item"><span class="spec-label">Output:</span> {salida}</div>
        </div>
    </div>

    <div class="editor-wrapper">
        <textarea class="code-input" autocomplete="off" spellcheck="false"
            placeholder="# Escribe tu código aquí...">{codigo_inicial}</textarea>
    </div>

    <div class="feedback-ia" style="display:none;">
        <div class="fb-content">
            <span class="fb-icon">🤖</span>
            <div class="fb-text"></div>
        </div>
    </div>
</div>
